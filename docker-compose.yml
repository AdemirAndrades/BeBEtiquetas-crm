services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: bbetiquetas_app

    working_dir: /var/www

    volumes:
      - ./backend:/var/www

    depends_on:
      - postgres

    networks:
      - crm

  nginx:

    image: nginx:latest

    container_name: bbetiquetas_nginx

    ports:
      - "8000:80"

    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - crm

  postgres:

    image: postgres:17

    container_name: bbetiquetas_postgres

    restart: always

    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - crm

  pgadmin:

    image: dpage/pgadmin4

    container_name: bbetiquetas_pgadmin

    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@crm.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

    networks:
      - crm

volumes:

  postgres_data:

networks:

  crm: